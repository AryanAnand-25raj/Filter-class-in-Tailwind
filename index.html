<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Filter-class-tailwind</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <img class="container m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <h1 class="container mx-auto bg-amber-700 ">Blurred image</h1>
    <img class=" blur container m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--Blur small-->
    <img class=" blur-sm container m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--Blur Medium-->
    <img class=" blur-md container m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--Blur large-->
    <img class=" blur-md container m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <h1 class="bg-cyan-400">Brightness</h1>

    <!--Brightness 50%-->
    <img class="brightness-50 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--Brightness 90%-->
    <img class="brightness-90 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--Brightness 120%-->
    <img class="brightness-110 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--Contrast-->

    <h1 class="bg-cyan-700 text-red-200">Contrast</h1>

    <!--Contrast 0-->
    <img class="contrast-0 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">
    
    <!--Contrast -->
    <img class="contrast-50 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--Contrast 0-->
    <img class="contrast-150 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <h1 class="bg-emerald-300 text-amber-50">grayScale</h1>
    <img class="grayscale m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <!--grayscale 25-->
    <img class="grayscale-25 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">
    <!--Grayscale 50-->
    <img class="grayscale-50 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">
    <!--Grayscale 75-->
    <img class="grayscale-75 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">
    <!--Grayscale 100-->
    <img class="grayscale-100 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <h1 class="bg-amber-400">Invert</h1>

    <!--Invert class-->
    
    <img class="invert m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">
    <!--Invert 0-100-->
    <img class="invert-50 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">


    <h1 class="bg-amber-400">Hue</h1>

    <!--Invert class-->
    
    <!--hue rotate 0-180-->
    <img class="hue-rotate-50 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">
    <!--Invert 0-100-->
    <img class="hue-rotate-180 m-auto h-30 w-30" src="./image.jpg " alt="image_not_found">

    <h1 class="blur bg-amber-300">Blue the simple content</h1>
</body>
</html>
